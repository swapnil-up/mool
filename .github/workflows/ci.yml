name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      - name: Build Koin Compiler Plugin (remove once 1.0.1+ is on Maven Central)
        run: |
          git clone --depth 1 https://github.com/InsertKoinIO/koin-compiler-plugin.git /tmp/koin-compiler-plugin
          cd /tmp/koin-compiler-plugin
          ./gradlew publishToMavenLocal -x test --no-daemon
      - run: ./gradlew allTests --no-daemon

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      - name: Build Koin Compiler Plugin (remove once 1.0.1+ is on Maven Central)
        run: |
          git clone --depth 1 https://github.com/InsertKoinIO/koin-compiler-plugin.git /tmp/koin-compiler-plugin
          cd /tmp/koin-compiler-plugin
          ./gradlew publishToMavenLocal -x test --no-daemon
      - run: ./gradlew :app:android:assembleDebug --no-daemon
