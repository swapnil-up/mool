build:
  weights:
    complexity: 2
    formatting: 1
    comments: 1

config:
  validation: true
  warningsAsErrors: false

processors:
  active: true

console-reports:
  active: true

style:
  MaxLineLength:
    active: false
  WildcardImport:
    active: false
  MagicNumber:
    active: false
  NewLineAtEndOfFile:
    active: false
  MandatoryBracesLoops:
    active: false
  ForbiddenComment:
    active: false
  UnusedPrivateMember:
    active: true
    excludes:
      - '**/commonTest/**'

complexity:
  LongMethod:
    active: false
  TooManyFunctions:
    active: false
  LargeClass:
    active: false
  ComplexCondition:
    active: false
  LongParameterList:
    functionThreshold: 7

exceptions:
  TooGenericExceptionCaught:
    active: false

naming:
  FunctionNaming:
    active: false
  TopLevelPropertyNaming:
    active: false
  InvalidPackageDeclaration:
    active: false
  MatchingDeclarationName:
    active: false
